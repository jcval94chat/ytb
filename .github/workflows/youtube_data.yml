name: Obtener datos de YouTube diariamente

on:
  schedule:
    - cron: '0 0 * * *'  # Diario a las 00:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Ventana de días para el snapshot actual'
        required: false
        type: string
      channel_limit:
        description: 'Límite opcional de canales a procesar'
        required: false
        type: string
      channel_filter:
        description: 'Filtro opcional por channel_id, nombre o URL normalizada'
        required: false
        type: string
      force_refresh_registry:
        description: 'Forzar refresco de channel_registry ignorando caché válida'
        required: false
        default: false
        type: boolean
      write_history:
        description: 'Escribir también en videos_history (append-only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: youtube-data-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Chequear el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el script
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SHEETS_CREDS_BASE64: ${{ secrets.GOOGLE_SHEETS_CREDS_BASE64 }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DAYS: ${{ github.event.inputs.days }}
          CHANNEL_LIMIT: ${{ github.event.inputs.channel_limit }}
          CHANNEL_FILTER: ${{ github.event.inputs.channel_filter }}
          FORCE_REFRESH_REGISTRY: ${{ github.event.inputs.force_refresh_registry }}
          WRITE_HISTORY: ${{ github.event.inputs.write_history }}
        run: |
          python youtube_data.py

      - name: Subir logs y reportes operativos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-data-artifacts
          path: |
            youtube_data.log
            run_report.json
            unresolved_urls.json
            channel_failures.json
